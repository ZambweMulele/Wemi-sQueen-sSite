<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Women's Wear | House of SK</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap">
    <style>
        :root { --brand: #B5697A; --bg: #FAF9F8; --border: #E5E5E5; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); }
        nav { position: sticky; top: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); z-index: 100; height: 80px; display: flex; align-items: center; padding: 0 40px; }
        .logo-group { display: flex; align-items: center; gap: 10px; text-decoration: none; color: black; font-weight: 800; text-transform: uppercase; }
        
        .layout { display: flex; min-height: calc(100vh - 80px); }
        .sidebar { width: 300px; border-right: 1px solid var(--border); padding: 40px; background: white; }
        .sidebar h4 { color: #888; font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase; }
        .sidebar-link { display: block; padding: 12px 0; color: #888; text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: 0.3s; }
        .sidebar-link:hover { color: var(--brand); }
        
        /* Highlight selected category in black */
        .sidebar-link.active { color: #000; font-weight: 800; border-left: 2px solid #000; padding-left: 15px; }

        .main { flex: 1; padding: 60px; }
        .title { font-weight: 800; font-size: 2.5rem; text-transform: uppercase; margin-bottom: 40px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .card { background: white; border: 1px solid var(--border); overflow: hidden; }
        .card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; }
        .card-info { padding: 20px; text-align: center; }

        /* Empty State */
        .empty-state { height: 400px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #aaa; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <nav><a href="index.html" class="logo-group"><img src="722363273_1910280719671822_74876.png" height="40"> House of SK</a></nav>
    <div class="layout">
        <aside class="sidebar">
            <h4>Collections</h4>
            <!-- Highlighted Category -->
            <a href="womens.html" class="sidebar-link active">New Arrivals</a>
            <a href="#" class="sidebar-link">Evening Gowns</a>
            <a href="#" class="sidebar-link">Corporate Sets</a>
            <a href="#" class="sidebar-link">Summer Luxe</a>
        </aside>
        <main class="main">
            <h1 class="title">New Arrivals</h1>
            <div class="grid">
                <!-- Example Items -->
                <div class="card"><img src="input_file_0.png"><div class="card-info"><strong>Gala Gown</strong><p>K1,100</p></div></div>
                <div class="card"><img src="input_file_1.png"><div class="card-info"><strong>Gold Back Dress</strong><p>K950</p></div></div>
            </div>

            <!-- This section is shown if a category is empty -->
            <!-- <div class="empty-state"><h3>New arrivals coming soon</h3></div> -->
        </main>
    </div>
</body>
</html>
